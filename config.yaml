name: "Realtime Demo"
app_id: "demo-realtime"
version: "1.0.0"
description: "Side-by-side comparison of WebSocket, SSE, REST polling, gRPC streaming, and MQTT"
schemas:
  - schemas/realtime.graphql

static_files:
  path: web
  route: /
  index: index.html
  not_found:
    file: index.html
    statusCode: 200
  build:
    source_dir: source
    command: npm run build